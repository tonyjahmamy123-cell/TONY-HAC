<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TONY-HACK | Authentification Sécurisée</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ========== RESET & BASE ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #e94560; --primary-dark: #c13b52; --primary-light: #ff6b8a;
            --bg-dark: #0a0e14; --bg-card: rgba(22, 27, 34, 0.95); --text-primary: #ffffff;
            --text-secondary: #8b949e; --border: rgba(233, 69, 96, 0.2); --success: #238636;
            --danger: #218bff; --warning: #d29922; --info: #58a6ff; --glass-border: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(10, 14, 20, 0.7); --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --shadow-hover: 0 30px 60px rgba(233, 69, 96, 0.15);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'SF Pro Display', Roboto, sans-serif;
            background: var(--bg-dark); min-height: 100vh; display: flex; align-items: center;
            justify-content: center; padding: 20px; position: relative; overflow-x: hidden;
        }
        .bg-animation { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -1; overflow: hidden; }
        .bg-gradient {
            position: absolute; width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(233, 69, 96, 0.12) 0%, transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(88, 166, 255, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 50% 50%, rgba(210, 153, 34, 0.05) 0%, transparent 70%);
            animation: gradientShift 20s ease-in-out infinite;
        }
        @keyframes gradientShift { 0%, 100% { transform: translate(0, 0) scale(1); } 33% { transform: translate(-5%, -3%) scale(1.1); } 66% { transform: translate(3%, 5%) scale(0.95); } }
        .bg-particles { position: absolute; width: 100%; height: 100%; }
        .particle { position: absolute; width: 2px; height: 2px; background: var(--primary); border-radius: 50%; opacity: 0.3; animation: float 15s infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0) translateX(0); opacity: 0; } 10% { opacity: 0.3; } 90% { opacity: 0.3; } }
        .login-wrapper { position: relative; z-index: 10; width: 100%; max-width: 480px; animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(10, 14, 20, 0.98); backdrop-filter: blur(20px); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .loading-overlay.active { display: flex; }
        .loading-content { text-align: center; }
        .loading-spinner { width: 80px; height: 80px; margin: 0 auto 30px; position: relative; }
        .spinner-ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 3px solid transparent; }
        .spinner-ring:nth-child(1) { border-top-color: var(--primary); animation: spin1 1.5s linear infinite; }
        .spinner-ring:nth-child(2) { border-right-color: var(--primary-light); animation: spin2 2s linear infinite; }
        .spinner-ring:nth-child(3) { border-bottom-color: var(--primary-dark); animation: spin3 2.5s linear infinite; }
        @keyframes spin1 { 100% { transform: rotate(360deg); } } @keyframes spin2 { 100% { transform: rotate(-360deg); } } @keyframes spin3 { 100% { transform: rotate(360deg); } }
        .loading-percentage { font-size: 24px; font-weight: 700; color: var(--primary); margin-bottom: 10px; }
        .loading-text { color: var(--text-secondary); font-size: 14px; letter-spacing: 3px; text-transform: uppercase; }
        .loading-bar { width: 200px; height: 3px; background: var(--border); border-radius: 3px; margin: 20px auto 0; overflow: hidden; }
        .loading-bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light)); border-radius: 3px; animation: fillBar 2s ease-in-out infinite; }
        @keyframes fillBar { 0% { width: 0%; } 50% { width: 70%; } 100% { width: 100%; } }
        .login-card { background: var(--glass-bg); backdrop-filter: blur(30px) saturate(180%); -webkit-backdrop-filter: blur(30px) saturate(180%); border: 1px solid var(--glass-border); border-radius: 32px; padding: 48px 40px; box-shadow: var(--shadow); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); position: relative; overflow: hidden; }
        .login-card::before { content: ''; position: absolute; top: 0; left: -100%; width: 200%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent); transition: left 0.8s; }
        .login-card:hover::before { left: 100%; }
        .login-card:hover { box-shadow: var(--shadow-hover); border-color: var(--primary); }
        .logo-section { text-align: center; margin-bottom: 40px; }
        .logo-icon { width: 80px; height: 80px; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); border-radius: 24px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; box-shadow: 0 15px 30px rgba(233, 69, 96, 0.3); position: relative; overflow: hidden; }
        .logo-icon::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%); animation: shine 3s infinite; }
        @keyframes shine { 0%, 100% { transform: translate(-30%, -30%); opacity: 0; } 50% { transform: translate(30%, 30%); opacity: 0.5; } }
        .logo-icon i { font-size: 36px; color: white; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
        .logo-text { font-size: 36px; font-weight: 800; letter-spacing: 3px; background: linear-gradient(135deg, #fff 0%, var(--primary-light) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-transform: uppercase; margin-bottom: 8px; }
        .logo-sub { font-size: 12px; color: var(--text-secondary); letter-spacing: 6px; text-transform: uppercase; opacity: 0.7; }
        .input-group { margin-bottom: 24px; position: relative; }
        .input-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); font-size: 18px; transition: all 0.3s; z-index: 1; }
        .input-group:focus-within .input-icon { color: var(--primary); }
        .input-field { width: 100%; padding: 18px 18px 18px 52px; background: rgba(10, 14, 20, 0.5); border: 1.5px solid var(--glass-border); border-radius: 18px; color: var(--text-primary); font-size: 16px; font-weight: 400; outline: none; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .input-field:focus { border-color: var(--primary); background: rgba(10, 14, 20, 0.7); box-shadow: 0 0 0 4px rgba(233, 69, 96, 0.1); }
        .input-field::placeholder { color: var(--text-secondary); font-weight: 300; opacity: 0.6; }
        .password-toggle { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 18px; padding: 5px; transition: all 0.2s; z-index: 2; }
        .password-toggle:hover { color: var(--primary); }
        .access-code-container { max-height: 0; opacity: 0; overflow: hidden; transition: max-height 0.4s ease, opacity 0.3s ease, margin 0.3s ease; margin: 0; }
        .access-code-container.show { max-height: 100px; opacity: 1; margin-bottom: 24px; }
        .form-options { display: flex; align-items: center; justify-content: space-between; margin: 20px 0 28px; }
        .remember-me { display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text-secondary); font-size: 14px; }
        .remember-me input { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; }
        .forgot-link { color: var(--primary-light); font-size: 14px; text-decoration: none; transition: all 0.2s; }
        .forgot-link:hover { color: var(--primary); text-decoration: underline; }
        .login-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; border: none; border-radius: 18px; font-size: 18px; font-weight: 700; letter-spacing: 1.5px; cursor: pointer; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 8px 25px rgba(233, 69, 96, 0.3); position: relative; overflow: hidden; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .login-btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transition: left 0.6s; }
        .login-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(233, 69, 96, 0.4); }
        .login-btn:hover::before { left: 100%; }
        .login-btn:active { transform: translateY(0); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .login-btn i { font-size: 18px; }
        .error-container { margin-bottom: 24px; }
        .error-message { background: rgba(218, 54, 51, 0.08); border: 1px solid rgba(218, 54, 51, 0.3); border-radius: 14px; padding: 14px 18px; color: var(--danger); font-size: 14px; display: none; align-items: center; gap: 12px; backdrop-filter: blur(10px); animation: shake 0.5s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); } 20%, 40%, 60%, 80% { transform: translateX(5px); } }
        .error-message.show { display: flex; }
        .error-message i { font-size: 20px; }
        .error-text { flex: 1; }
        .attempts-counter { font-size: 12px; color: var(--text-secondary); margin-top: 8px; text-align: right; }
        .security-info { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--glass-border); }
        .security-badge { display: flex; align-items: center; gap: 6px; color: var(--success); font-size: 12px; }
        .security-badge i { font-size: 14px; }
        .version-badge { color: var(--text-secondary); font-size: 12px; }
        .language-selector { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .lang-btn { background: none; border: none; color: var(--text-secondary); font-size: 13px; font-weight: 500; cursor: pointer; padding: 6px 12px; border-radius: 20px; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px; }
        .lang-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
        .lang-btn.active { color: var(--primary); background: rgba(233, 69, 96, 0.1); }
        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 10000; display: flex; flex-direction: column; gap: 12px; }
        .toast { background: var(--bg-card); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 14px; padding: 16px 20px; display: flex; align-items: center; gap: 14px; min-width: 320px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideIn { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
        .toast.success { border-left: 4px solid var(--success); }
        .toast.error { border-left: 4px solid var(--danger); }
        .toast.info { border-left: 4px solid var(--info); }
        .toast.warning { border-left: 4px solid var(--warning); }
        .toast i { font-size: 22px; }
        .toast.success i { color: var(--success); }
        .toast.error i { color: var(--danger); }
        .toast.info i { color: var(--info); }
        .toast.warning i { color: var(--warning); }
        .toast-content { flex: 1; }
        .toast-title { font-weight: 700; margin-bottom: 4px; color: var(--text-primary); }
        .toast-message { font-size: 13px; color: var(--text-secondary); }
        .toast-close { color: var(--text-secondary); cursor: pointer; padding: 4px; transition: color 0.2s; }
        .toast-close:hover { color: var(--text-primary); }
        .session-warning { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--warning); color: var(--bg-dark); padding: 14px 24px; border-radius: 40px; font-size: 14px; font-weight: 600; z-index: 10001; display: none; align-items: center; gap: 12px; box-shadow: 0 10px 30px rgba(210, 153, 34, 0.3); animation: slideDown 0.3s; }
        @keyframes slideDown { from { opacity: 0; transform: translate(-50%, -100%); } to { opacity: 1; transform: translate(-50%, 0); } }
        .session-warning.show { display: flex; }
        .session-warning button { background: var(--bg-dark); color: white; border: none; padding: 6px 16px; border-radius: 20px; font-weight: 600; cursor: pointer; margin-left: 12px; }
        @media (max-width: 480px) { .login-card { padding: 36px 24px; } .logo-text { font-size: 28px; } .input-field { padding: 16px 16px 16px 48px; font-size: 15px; } .toast { min-width: auto; width: calc(100vw - 40px); } }
    </style>
</head>
<body>
    <div class="bg-animation"><div class="bg-gradient"></div><div class="bg-particles" id="particles"></div></div>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="loading-spinner"><div class="spinner-ring"></div><div class="spinner-ring"></div><div class="spinner-ring"></div></div>
            <div class="loading-percentage" id="loadingPercentage">0%</div>
            <div class="loading-text">Authentification en cours</div>
            <div class="loading-bar"><div class="loading-bar-fill"></div></div>
        </div>
    </div>
    <div class="session-warning" id="sessionWarning"><i class="fas fa-clock"></i><span>Session expire dans <span id="timeoutCountdown">60</span>s</span><button onclick="extendSession()">Prolonger</button></div>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="language-selector"><button class="lang-btn active" onclick="setLanguage('fr')">FR</button><button class="lang-btn" onclick="setLanguage('en')">EN</button><button class="lang-btn" onclick="setLanguage('mg')">MG</button></div>
            <div class="logo-section"><div class="logo-icon"><i class="fas fa-shield-hal"></i></div><div class="logo-text">TONY-HACK</div><div class="logo-sub">SECURE ACCESS</div></div>
            <div class="error-container"><div class="error-message" id="errorMessage"><i class="fas fa-exclamation-triangle"></i><span class="error-text" id="errorText">Identifiants incorrects</span></div><div class="attempts-counter" id="attemptsCounter"></div></div>
            <form id="loginForm" method="POST">
                <div class="input-group"><i class="fas fa-user input-icon"></i><input type="text" name="username" id="username" class="input-field" placeholder="Identifiant" autocomplete="off" required autofocus></div>
                <div class="input-group"><i class="fas fa-lock input-icon"></i><input type="password" name="password" id="passwordField" class="input-field" placeholder="Mot de passe" autocomplete="off" required><button type="button" class="password-toggle" onclick="togglePassword()"><i class="fas fa-eye" id="toggleIcon"></i></button></div>
                <div class="access-code-container" id="accessCodeContainer"><div class="input-group"><i class="fas fa-key input-icon"></i><input type="password" name="access_code" id="accessCodeField" class="input-field" placeholder="Code de sécurité" autocomplete="off"><button type="button" class="password-toggle" onclick="toggleAccessCode()"><i class="fas fa-eye" id="accessToggleIcon"></i></button></div></div>
                <div class="form-options"><label class="remember-me"><input type="checkbox" name="remember" id="rememberMe"><span>Se souvenir</span></label><a href="#" class="forgot-link">Identifiants oubliés ?</a></div>
                <button type="submit" class="login-btn" id="loginBtn"><i class="fas fa-arrow-right-to-bracket"></i><span>Authentification</span></button>
            </form>
            <div class="security-info"><div class="security-badge"><i class="fas fa-lock"></i><span>AES-256</span></div><span class="version-badge">v3.0.0</span><div class="security-badge"><i class="fas fa-shield"></i><span>2FA Ready</span></div></div>
        </div>
    </div>
    <div class="toast-container" id="toastContainer"></div>
    <script>
        let failedAttempts=0;const MAX_ATTEMPTS=5;let sessionTimeout,timeoutWarning,currentLanguage='fr';
        const translations={fr:{username:'Identifiant',password:'Mot de passe',accessCode:'Code de sécurité',login:'Authentification',remember:'Se souvenir',forgot:'Identifiants oubliés ?',error:'Identifiants incorrects',locked:'Compte verrouillé. Réessayez dans {minutes} minutes.',attempts:'Tentatives: {current}/{max}',loading:'Authentification en cours',sessionExpiring:'Session expire dans {seconds}s',extend:'Prolonger'},en:{username:'Username',password:'Password',accessCode:'Security Code',login:'Authenticate',remember:'Remember me',forgot:'Forgot credentials?',error:'Invalid credentials',locked:'Account locked. Try again in {minutes} minutes.',attempts:'Attempts: {current}/{max}',loading:'Authenticating',sessionExpiring:'Session expires in {seconds}s',extend:'Extend'},mg:{username:'Solon\'anarana',password:'Teny miafina',accessCode:'Kaody fiarovana',login:'Hiditra',remember:'Tsarovy',forgot:'Adino ny teny miafina?',error:'Diso ny solon\'anarana na teny miafina',locked:'Voahidy ny kaonty. Andramo afaka {minutes} minitra.',attempts:'Andrana: {current}/{max}',loading:'Eo am-pidirana',sessionExpiring:'Hifarana afaka {seconds}s ny session',extend:'Hanitatra'}};
        document.addEventListener('DOMContentLoaded',function(){generateParticles();setupPasswordField();loadSavedCredentials();startSessionTimeout();updateLanguage();});
        function generateParticles(){const c=document.getElementById('particles');for(let i=0;i<50;i++){const p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'%';p.style.top=Math.random()*100+'%';p.style.animationDelay=Math.random()*15+'s';p.style.animationDuration=(10+Math.random()*20)+'s';c.appendChild(p);}}
        function setupPasswordField(){const p=document.getElementById('passwordField'),a=document.getElementById('accessCodeContainer');p.addEventListener('focus',()=>a.classList.add('show'));p.addEventListener('input',function(){if(this.value.length>=3)a.classList.add('show');});}
        function loadSavedCredentials(){const s=localStorage.getItem('tony_hack_remember');if(s){try{const c=JSON.parse(s);document.getElementById('username').value=c.username||'';document.getElementById('rememberMe').checked=true;}catch(e){}}}
        function togglePassword(){const f=document.getElementById('passwordField'),i=document.getElementById('toggleIcon');if(f.type==='password'){f.type='text';i.classList.remove('fa-eye');i.classList.add('fa-eye-slash');}else{f.type='password';i.classList.remove('fa-eye-slash');i.classList.add('fa-eye');}}
        function toggleAccessCode(){const f=document.getElementById('accessCodeField'),i=document.getElementById('accessToggleIcon');if(f.type==='password'){f.type='text';i.classList.remove('fa-eye');i.classList.add('fa-eye-slash');}else{f.type='password';i.classList.remove('fa-eye-slash');i.classList.add('fa-eye');}}
        function setLanguage(l){currentLanguage=l;document.querySelectorAll('.lang-btn').forEach(b=>{b.classList.remove('active');if(b.textContent.trim().toLowerCase()===l)b.classList.add('active');});updateLanguage();localStorage.setItem('tony_hack_lang',l);}
        function updateLanguage(){const t=translations[currentLanguage];document.getElementById('username').placeholder=t.username;document.getElementById('passwordField').placeholder=t.password;document.getElementById('accessCodeField').placeholder=t.accessCode;document.querySelector('.login-btn span').textContent=t.login;document.querySelector('.remember-me span').textContent=t.remember;document.querySelector('.forgot-link').textContent=t.forgot;document.querySelector('.loading-text').textContent=t.loading;const s=localStorage.getItem('tony_hack_lang');if(s){currentLanguage=s;document.querySelectorAll('.lang-btn').forEach(b=>{b.classList.remove('active');if(b.textContent.trim().toLowerCase()===s)b.classList.add('active');});}}
        function showToast(title,message,type='info'){const c=document.getElementById('toastContainer'),t=document.createElement('div');t.className=`toast ${type}`;let i='info-circle';if(type==='success')i='check-circle';if(type==='error')i='exclamation-circle';if(type==='warning')i='exclamation-triangle';t.innerHTML=`<i class="fas fa-${i}"></i><div class="toast-content"><div class="toast-title">${title}</div><div class="toast-message">${message}</div></div><div class="toast-close" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></div>`;c.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(100%)';setTimeout(()=>t.remove(),300);},5000);}
        function startSessionTimeout(){const S=30*60*1000,W=5*60*1000;timeoutWarning=setTimeout(()=>{showSessionWarning();},S-W);sessionTimeout=setTimeout(()=>{showToast('Session expirée','Veuillez vous reconnecter','warning');setTimeout(()=>location.reload(),2000);},S);}
        function showSessionWarning(){const w=document.getElementById('sessionWarning'),c=document.getElementById('timeoutCountdown');let s=300;w.classList.add('show');const i=setInterval(()=>{s--;c.textContent=s;if(s<=0){clearInterval(i);w.classList.remove('show');}},1000);window.extendSession=function(){clearInterval(i);w.classList.remove('show');clearTimeout(sessionTimeout);clearTimeout(timeoutWarning);startSessionTimeout();showToast('Session prolongée','Votre session a été prolongée','success');};}
        document.getElementById('loginForm').addEventListener('submit',async(e)=>{e.preventDefault();const l=document.getElementById('loadingOverlay'),err=document.getElementById('errorMessage'),errT=document.getElementById('errorText'),btn=document.getElementById('loginBtn'),pct=document.getElementById('loadingPercentage'),t=translations[currentLanguage];err.classList.remove('show');l.classList.add('active');btn.disabled=true;let prog=0;const progInt=setInterval(()=>{prog+=Math.random()*15;if(prog>=90)prog=90;pct.textContent=Math.min(Math.floor(prog),90)+'%';},200);const f=new FormData(e.target);if(document.getElementById('rememberMe').checked){localStorage.setItem('tony_hack_remember',JSON.stringify({username:f.get('username')}));}else{localStorage.removeItem('tony_hack_remember');}
        try{const r=await fetch('/login',{method:'POST',body:f});clearInterval(progInt);pct.textContent='100%';const d=await r.json();if(d.success){showToast('Succès','Authentification réussie','success');setTimeout(()=>{window.location.href=d.redirect;},800);}else{failedAttempts++;updateAttemptsCounter(t);l.classList.remove('active');btn.disabled=false;errT.textContent=d.message||t.error;err.classList.add('show');document.getElementById('accessCodeContainer').classList.add('show');showToast('Erreur',d.message||t.error,'error');if(d.message&&d.message.includes('verrouillé')){btn.disabled=true;setTimeout(()=>{btn.disabled=false;failedAttempts=0;updateAttemptsCounter(t);},15*60*1000);}}}catch(er){clearInterval(progInt);l.classList.remove('active');btn.disabled=false;errT.textContent='Erreur de connexion';err.classList.add('show');showToast('Erreur','Impossible de se connecter au serveur','error');}});
        function updateAttemptsCounter(t){const c=document.getElementById('attemptsCounter');if(failedAttempts>0){c.textContent=t.attempts.replace('{current}',failedAttempts).replace('{max}',MAX_ATTEMPTS);}else{c.textContent='';}}
        document.addEventListener('keydown',(e)=>{if(e.ctrlKey&&e.key==='Enter'){e.preventDefault();document.getElementById('loginForm').dispatchEvent(new Event('submit'));}if(e.key==='Escape'){document.querySelectorAll('.toast').forEach(t=>t.remove());document.getElementById('sessionWarning')?.classList.remove('show');}});
        let isSubmitting=false;document.getElementById('loginForm').addEventListener('submit',function(e){if(isSubmitting){e.preventDefault();return false;}isSubmitting=true;setTimeout(()=>{isSubmitting=false;},2000);});
    </script>
</body>
</html>
